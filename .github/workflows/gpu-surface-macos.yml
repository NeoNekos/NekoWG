name: gpu surface macos smoke

on:
  workflow_dispatch:

env:
  CARGO_TERM_COLOR: always
  RUST_BACKTRACE: "1"
  NEKOWG_GPU_SURFACE_VISUAL_SMOKE: "1"

jobs:
  macos-gpu-surface:
    name: macos gpu surface smoke
    runs-on: macos-latest
    timeout-minutes: 30

    steps:
      - uses: actions/checkout@v6

      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.93

      - uses: Swatinem/rust-cache@v2
        with:
          key: macos-gpu-surface-${{ hashFiles('Cargo.lock') }}

      - name: step::run_gpu_surface_visual_smoke
        run: >
          cargo run
          -p nekowg
          --example gpu_surface
          --features test-support,nekowg_platform/test-support
