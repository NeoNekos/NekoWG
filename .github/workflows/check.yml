name: check and test

on:
  push:
  pull_request:

env:
  CARGO_TERM_COLOR: always

jobs:
  desktop:
    name: desktop (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
    steps:
      - uses: actions/checkout@v6
      - uses: dtolnay/rust-toolchain@v1
        with:
          toolchain: 1.93
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ runner.os }}-${{ hashFiles('Cargo.lock') }}
      - name: step::install_linux_deps
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y pkg-config libfontconfig1-dev libxkbcommon-dev libxkbcommon-x11-dev libwayland-dev libx11-dev libxrandr-dev libxi-dev libxcursor-dev libxfixes-dev libxinerama-dev libxcb-shape0-dev libxcb-xfixes0-dev
      - name: step::check
        run: cargo clippy --workspace --all-targets -- -D warnings
      - name: step::test
        run: cargo test --workspace --locked
